<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadEx // Recovery Node</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background:#020202;
    color:#e5e5e5;
    font-family:'JetBrains Mono', monospace;
}
.glow { text-shadow:0 0 12px #22c55e; }
.box {
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(34,197,94,0.15);
    backdrop-filter: blur(10px);
}
.scan {
    position:fixed;
    width:100%;
    height:2px;
    background:#22c55e;
    top:0;
    animation:scan 6s linear infinite;
}
@keyframes scan {
    0%{top:0}
    100%{top:100%}
}
</style>
</head>

<body>

<div class="scan"></div>

<!-- HEADER -->
<div class="p-4 flex justify-between text-xs text-green-500">
<span>DEADEx // NODE ACTIVE</span>
<span class="animate-pulse">● ONLINE</span>
</div>

<!-- HERO -->
<div class="text-center mt-20">
<h1 class="text-5xl font-bold glow">
ACCESS<br>LOCKED VALUE
</h1>

<p class="text-gray-500 mt-6 max-w-md mx-auto">
Most tokens die. Some still contain extractable liquidity.  
DeadEx allows recovery where others see zero.
</p>

<p class="text-green-500/60 text-xs mt-6 tracking-[0.3em]">
RESTRICTED PROTOCOL ACCESS
</p>
</div>

<!-- SWAP TERMINAL -->
<div class="max-w-md mx-auto mt-16 box p-6 rounded-xl">

<div class="text-green-500 text-xs mb-4">
Recovery Node // Active
</div>

<select id="tokenSelect" onchange="updatePrice()" class="w-full p-3 bg-black mb-4">
<option>BTCBR</option>
<option>BNBTIGER</option>
<option>USDT.z</option>
<option>TERAREUM</option>
<option>SAITAMA</option>
<option>FEG</option>
<option>BABYDOGE</option>
<option>KISHU</option>
<option>SAFEMOON</option>
<option>ELON</option>
</select>

<input id="inputAmt" oninput="updatePrice()" type="number" placeholder="ENTER AMOUNT"
class="w-full p-3 bg-black mb-4 text-green-500">

<div class="p-3 bg-black mb-4">
USDX OUTPUT: <span id="outputAmt">0.00</span>
</div>

<button id="swapBtn" class="w-full bg-green-500 text-black p-3 font-bold">
INITIATE RECOVERY
</button>

</div>

<!-- LIVE FEED -->
<div id="feed" class="fixed bottom-4 right-4 text-xs space-y-2"></div>

<!-- SCRIPT -->
<script>
const rates = {'BTCBR':1000000,'BNBTIGER':5000000,'USDT.z':1000,'TERAREUM':2000000,'SAITAMA':1500000,'FEG':800000,'BABYDOGE':3000000,'KISHU':1200000,'SAFEMOON':900000,'ELON':10000000};

function updatePrice(){
let t=document.getElementById("tokenSelect").value;
let i=document.getElementById("inputAmt").value;
document.getElementById("outputAmt").innerText=i>0?(i/rates[t]).toFixed(4):"0.00";
}

document.getElementById("swapBtn").onclick=()=>{
alert("NODE EXECUTION INITIATED...");
};

// FAKE LIVE FEED
function log(){
let wallets=["0x4a...21","0x8c...99","0x1d...32"];
let div=document.createElement("div");
div.className="box p-2";
div.innerHTML=`
<span class="text-green-500">NODE EXECUTED</span><br>
${wallets[Math.floor(Math.random()*3)]} recovered ${(Math.random()*10).toFixed(2)} USDX
`;
document.getElementById("feed").appendChild(div);
setTimeout(()=>div.remove(),4000);
}
setInterval(log,3000);
</script>

</body>
</html>
