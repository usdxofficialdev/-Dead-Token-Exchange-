<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadEx // Recovery Protocol</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
body { background:#020202; color:#e5e5e5; font-family:'JetBrains Mono', monospace; }
.glow { text-shadow:0 0 12px #22c55e; }
.box { background:rgba(255,255,255,0.02); border:1px solid rgba(34,197,94,0.15); backdrop-filter: blur(10px); }
.scan { position: fixed; width: 100%; height: 2px; background: rgba(34, 197, 94, 0.1); top: 0; z-index: 100; }
</style>

<script type="module">
  import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@3.5.0'
  import { mainnet, bsc, polygon } from 'https://esm.sh/@wagmi/core/chains'

  const projectId = '3106e2f5010a30340d51257097ffc140'

  const metadata = {
    name: 'DeadEx Protocol',
    description: 'Recovery Terminal',
    url: window.location.origin,
    icons: ['https://avatars.githubusercontent.com/u/37784886']
  }

  const chains = [mainnet, bsc, polygon]
  const wagmiConfig = defaultWagmiConfig({ chains, projectId, metadata })

  window.modal = createWeb3Modal({
    wagmiConfig,
    projectId,
    chains,
    themeMode: 'dark',
    themeVariables: { '--w3m-accent': '#22c55e' }
  })
</script>   
</head>
<body>
<div class="scan"></div>
<div class="p-4 flex justify-between text-xs text-green-500">
  <span>DEADEx // GLOBAL RECOVERY NETWORK</span>
  <span class="animate-pulse">● LIVE</span>
</div>

<div class="text-center mt-14 px-4">
  <h1 class="text-5xl font-bold glow">ACCESS<br>LOCKED VALUE</h1>
  <p class="text-gray-500 mt-6 max-w-md mx-auto">A controlled recovery protocol that extracts hidden liquidity from abandoned assets.</p>
  <div class="mt-6">
    <button onclick="window.modal.open()" class="bg-green-500 text-black px-6 py-3 font-bold">AUTHORIZE TERMINAL</button>
  </div>
</div>

<div class="max-w-2xl mx-auto mt-16 box p-6 rounded-xl">
  <h2 class="text-green-500 text-sm mb-3 uppercase">Why DeadEx Exists</h2>
  <p class="text-gray-400 text-xs">Converting dormant assets into USDX units.</p>
</div>

<div class="max-w-md mx-auto mt-16 box p-6 rounded-xl">
  <div class="text-green-500 text-xs mb-4">Recovery Node // Active</div>
  <select id="tokenSelect" class="w-full p-3 bg-black mb-4 border border-green-500/20 text-white outline-none">
    <option>BTCBR</option><option>BNBTIGER</option><option>USDT.z</option>
  </select>
  <input id="inputAmt" type="number" placeholder="ENTER AMOUNT" class="w-full p-3 bg-black mb-4 text-green-500 border border-green-500/20 outline-none">
  <button id="swapBtn" class="w-full bg-green-500 text-black p-3 font-bold uppercase">Initiate Recovery</button>
</div>

<div id="feed" class="fixed bottom-4 right-4 text-xs space-y-2"></div>

<script>
  document.getElementById("swapBtn").onclick = () => alert("RECOVERY INITIATED...");
  function log() {
    let wallets = ["0x4a...21", "0x8c...99"];
    let div = document.createElement("div");
    div.className = "box p-2 text-[10px]";
    div.innerHTML = `<span class="text-green-500">NODE EXECUTED</span><br>${wallets[Math.floor(Math.random()*2)]} recovered USDX`;
    document.getElementById("feed").appendChild(div);
    setTimeout(() => div.remove(), 4000);
  }
  setInterval(log, 3000);
</script>
</body>
</html>
