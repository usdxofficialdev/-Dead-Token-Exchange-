<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadSwap | Institutional Liquidity Recovery Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-text { text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .feed-item { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="liveFeed" class="fixed bottom-6 right-6 z-50 space-y-2 pointer-events-none"></div>

    <nav class="max-w-7xl mx-auto p-6 flex justify-between items-center sticky top-0 z-40 bg-[#050505]/80 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.3)]">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="text-2xl font-black tracking-tighter uppercase">Dead<span class="text-green-500">Swap</span></span>
        </div>
        <button id="connectBtn" class="glass px-8 py-3 rounded-2xl font-bold hover:bg-white hover:text-black transition-all border-green-500/20">
            Connect Wallet
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-16 pb-32 grid lg:grid-cols-2 gap-20 items-start">
        <div class="space-y-10">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-green-500/10 border border-green-500/20">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-ping"></div>
                <span class="text-green-500 text-[10px] font-black uppercase tracking-widest">Active Recovery Pool: $1.2M USDX</span>
            </div>
            <h1 class="text-6xl lg:text-8xl font-extrabold leading-[0.85] tracking-tighter">DON'T LET ASSETS <span class="text-green-500">DIE.</span></h1>
            <p class="text-gray-400 text-xl leading-relaxed max-w-lg">Swap illiquid legacy tokens for tradeable stablecoins. Verified by top auditors.</p>

            <div class="flex flex-wrap gap-10 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-700">
                <span class="font-black text-xl italic tracking-tighter uppercase">Certik</span>
                <span class="font-black text-xl italic tracking-tighter uppercase">Hacken</span>
                <span class="font-black text-xl italic tracking-tighter uppercase">Slowmist</span>
            </div>

            <div class="grid grid-cols-3 gap-8 pt-6 border-t border-white/10">
                <div><p id="userCount" class="text-3xl font-black text-green-500">12,482</p><p class="text-[10px] text-gray-500 uppercase font-bold">Active Users</p></div>
                <div><p class="text-3xl font-black text-white">$4.8M</p><p class="text-[10px] text-gray-500 uppercase font-bold">Recovered</p></div>
                <div><p class="text-3xl font-black text-white">No Fee</p><p class="text-[10px] text-gray-500 uppercase font-bold">Policy</p></div>
            </div>
        </div>

        <div class="glass p-1 rounded-[3rem]">
            <div class="bg-[#0a0a0a] rounded-[2.8rem] p-8 lg:p-12">
                <h3 class="font-black text-sm uppercase tracking-[0.3em] text-gray-500 mb-8">Liquidation Terminal</h3>
                <div class="space-y-4">
                    <div class="bg-black/40 p-6 rounded-3xl border border-white/5">
                        <label class="text-[10px] text-gray-500 font-black uppercase mb-4 block">Asset to Recycle</label>
                        <div class="flex gap-4">
                            <select id="tokenSelect" class="bg-transparent text-xl font-bold outline-none text-green-400 w-full">
                                <option value="1000000">BTCBR</option>
                                <option value="5000000">BNBTIGER</option>
                                <option value="1000">USDT.z</option>
                            </select>
                            <input type="number" id="inputAmt" placeholder="0.00" class="bg-transparent text-right text-3xl font-black outline-none w-full" oninput="updatePrice()">
                        </div>
                    </div>
                    <div class="bg-black/40 p-6 rounded-3xl border border-white/5">
                        <label class="text-[10px] text-gray-500 font-black uppercase mb-4 block">Receive Liquidity</label>
                        <div class="flex justify-between items-center text-2xl font-black">
                            <span>USDX</span><span id="outputAmt" class="text-white">0.00</span>
                        </div>
                    </div>
                </div>
                <button id="swapBtn" class="w-full bg-green-500 text-black py-6 rounded-3xl font-black text-sm uppercase mt-8 tracking-widest hover:shadow-[0_0_30px_rgba(34,197,94,0.3)] transition-all">Initialize Liquidation</button>
            </div>
        </div>
    </main>

    <script>
        const rates = {'BTCBR': 1000000, 'BNBTIGER': 5000000, 'USDT.z': 1000};
        function updatePrice() {
            const select = document.getElementById('tokenSelect');
            const tokenName = select.options[select.selectedIndex].text;
            const input = document.getElementById('inputAmt').value;
            document.getElementById('outputAmt').innerText = input > 0 ? (input / rates[tokenName]).toFixed(4) : "0.00";
        }

        // Fake Live Feed
        function showNotification() {
            const wallets = ["0x4f...d21", "0x1a...f89", "0x9c...b42", "0xee...321"];
            const div = document.createElement('div');
            div.className = "glass p-4 rounded-2xl border-l-4 border-green-500 feed-item";
            div.innerHTML = `<span class="text-xs font-bold text-gray-400">User <b class="text-white">${wallets[Math.floor(Math.random()*wallets.length)]}</b> recovered <b class="text-green-500">${(Math.random()*10).toFixed(1)} USDX</b></span>`;
            document.getElementById('liveFeed').appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
        setInterval(showNotification, 8000);

        // Wallet Connect
        async function connect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
                document.getElementById('connectBtn').className = "bg-green-600 text-white px-8 py-3 rounded-2xl font-bold";
            } else { alert("Please open in MetaMask or Trust Wallet browser."); }
        }
        document.getElementById('connectBtn').onclick = connect;
    </script>
</body>
</html>
