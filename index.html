<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Token Exchange | Demo Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
    </style>
</head>
<body id="mainBody" class="bg-[#050505] text-white min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500">

    <div class="fixed top-20 bg-gray-800 p-2 rounded-full flex gap-2 z-50 border border-white/10">
        <button onclick="setDesign(1)" class="px-4 py-1 rounded-full bg-gray-700 text-xs hover:bg-white hover:text-black transition">Demo 1</button>
        <button onclick="setDesign(2)" class="px-4 py-1 rounded-full bg-gray-700 text-xs hover:bg-white hover:text-black transition">Demo 2</button>
        <button onclick="setDesign(3)" class="px-4 py-1 rounded-full bg-gray-700 text-xs hover:bg-white hover:text-black transition">Demo 3</button>
    </div>

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center max-w-6xl">
        <h1 id="logo" class="text-2xl font-black tracking-tighter text-green-500 uppercase">Dead Token Ex</h1>
        <button id="connectWallet" class="bg-white text-black px-6 py-2 rounded-full font-bold">Connect Wallet</button>
    </nav>

    <main id="swapCard" class="w-full max-w-md mt-10 p-8 rounded-3xl border transition-all duration-500 shadow-2xl">
        <h2 id="cardTitle" class="text-xl font-bold mb-6 italic">RECOVERY PORTAL</h2>
        
        <div class="space-y-4">
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[10px] text-gray-500 uppercase font-bold">From (Dead Token)</label>
                <select id="tokenSelect" class="w-full bg-transparent text-lg font-bold outline-none mt-2 text-green-400 cursor-pointer">
                    <option value="btcbr">BTCBR</option>
                    <option value="tiger">BNBTIGER</option>
                    <option value="usdtz">USDT.z</option>
                </select>
            </div>

            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Amount</label>
                <input type="number" placeholder="0.00" class="w-full bg-transparent text-xl font-bold outline-none mt-2">
            </div>

            <div class="p-4 rounded-2xl bg-green-500/10 border border-green-500/20 flex justify-between items-center">
                <span class="text-sm font-medium">Receive:</span>
                <span class="text-green-500 font-black text-xl">0.00 USDX</span>
            </div>

            <button id="actionBtn" class="w-full py-4 rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">
                Exchange Now
            </button>
        </div>
    </main>

    <script>
        function setDesign(num) {
            const body = document.getElementById('mainBody');
            const card = document.getElementById('swapCard');
            const btn = document.getElementById('actionBtn');
            const logo = document.getElementById('logo');

            if(num === 1) { // Dark Pro
                body.className = "bg-[#0a0a0a] text-white min-h-screen flex flex-col items-center justify-center p-4 transition-all";
                card.className = "w-full max-w-md p-8 rounded-[40px] border border-white/10 bg-[#111] shadow-2xl transition-all";
                btn.className = "w-full py-4 rounded-2xl bg-white text-black font-black uppercase tracking-widest mt-4 hover:bg-green-500 transition-all";
                logo.className = "text-2xl font-bold text-white tracking-widest";
            } 
            else if(num === 2) { // Neon Tech
                body.className = "bg-black text-white min-h-screen flex flex-col items-center justify-center p-4 transition-all font-mono";
                card.className = "w-full max-w-md p-8 rounded-none border-2 border-green-500 bg-black neon-glow transition-all";
                btn.className = "w-full py-4 rounded-none bg-green-500 text-black font-black uppercase mt-4 hover:bg-green-400 transition-all";
                logo.className = "text-2xl font-black text-green-500 uppercase italic";
            }
            else { // Clean Portal
                body.className = "bg-[#f4f4f4] text-black min-h-screen flex flex-col items-center justify-center p-4 transition-all";
                card.className = "w-full max-w-md p-8 rounded-3xl border border-black/5 bg-white shadow-xl transition-all";
                btn.className = "w-full py-4 rounded-2xl bg-blue-600 text-white font-black uppercase mt-4 shadow-lg shadow-blue-200";
                logo.className = "text-2xl font-black text-blue-600";
                document.getElementById('connectWallet').className = "bg-blue-600 text-white px-6 py-2 rounded-full font-bold";
            }
        }
        // Default set to 1
        setDesign(1);
    </script>
</body>
</html>
