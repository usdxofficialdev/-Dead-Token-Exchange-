<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TetherSwap</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
    }
  </style>
</head>

<body>

<div class="max-w-md mx-auto mt-10 p-5">

  <div class="text-center mb-8">

    <img
      src="https://cryptologos.cc/logos/tether-usdt-logo.png"
      class="w-20 mx-auto mb-4"
    >

    <h1 class="text-4xl font-bold">
      TetherSwap
    </h1>

    <p class="text-gray-400 mt-2">
      Fast crypto swap interface
    </p>

  </div>

  <div class="card rounded-2xl p-5">

    <div class="mb-4">

      <div class="text-sm text-gray-400 mb-2">
        From
      </div>

      <select
        class="w-full bg-black p-4 rounded-xl outline-none"
      >
        <option>BNB</option>
        <option>USDT</option>
        <option>BTC</option>
      </select>

    </div>

    <div class="mb-4">

      <input
        type="number"
        placeholder="0.00"
        class="w-full bg-black p-4 rounded-xl outline-none"
      >

    </div>

    <div class="text-center text-2xl mb-4">
      ↓
    </div>

    <div class="mb-4">

      <div class="text-sm text-gray-400 mb-2">
        To
      </div>

      <select
        class="w-full bg-black p-4 rounded-xl outline-none"
      >
        <option>USDX</option>
        <option>USDT</option>
        <option>ETH</option>
      </select>

    </div>

    <button
      onclick="connectWallet()"
      class="w-full bg-green-500 hover:bg-green-400 text-black p-4 rounded-xl font-bold"
    >
      CONNECT WALLET
    </button>

    <div
      id="wallet"
      class="text-center text-green-400 mt-4 text-sm"
    >
      Wallet Not Connected
    </div>

  </div>

</div>

<script>

async function connectWallet(){

  if(!window.ethereum){
    alert("Install MetaMask");
    return;
  }

  try{

    const accounts =
      await window.ethereum.request({
        method:"eth_requestAccounts"
      });

    const wallet = accounts[0];

    document.getElementById("wallet").innerText =
      wallet.slice(0,6) +
      "..." +
      wallet.slice(-4);

  }catch(err){
    console.log(err);
  }
}

</script>

</body>
</html>
